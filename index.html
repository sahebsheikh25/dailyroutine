<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayFlow — Nandani Kumari's Daily Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6ff7;
    --accent2: #f97316;
    --accent3: #22d3ee;
    --text: #f0f0fa;
    --muted: #6b6b8a;
    --success: #4ade80;
    --glow: rgba(124,111,247,0.15);
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(124,111,247,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(34,211,238,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: gradientShift 8s ease-in-out infinite;
  }

  @keyframes gradientShift {
    0%, 100% { transform: translate(0, 0) }
    50% { transform: translate(20px, -20px) }
  }

  .login-wrapper {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .welcome-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 60px 40px;
    max-width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    animation: slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }

  .welcome-box::before {
    content: '';
    position: absolute;
    top: -80px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    background: var(--accent);
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.2;
    pointer-events: none;
  }

  .welcome-emoji {
    font-size: 64px;
    display: block;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }

  .welcome-title {
    font-family: var(--font-head);
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .welcome-name {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 24px;
    font-family: var(--font-head);
  }

  .welcome-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: transform 0.2s, box-shadow 0.2s;
    min-width: 200px;
  }

  .welcome-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(124,111,247,0.4);
  }

  .welcome-btn:active {
    transform: translateY(0);
  }

  .welcome-footer {
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) }
    50% { transform: translateY(-12px) }
  }

  .loading-text {
    color: var(--muted);
    font-size: 14px;
    margin-top: 20px;
    animation: pulse-text 1.5s ease-in-out infinite;
  }

  @keyframes pulse-text {
    0%, 100% { opacity: 0.6 }
    50% { opacity: 1 }
  }

  @media (max-width: 480px) {
    .welcome-box {
      padding: 40px 24px;
      border-radius: 20px;
    }

    .welcome-title {
      font-size: 26px;
    }

    .welcome-emoji {
      font-size: 48px;
    }

    .welcome-btn {
      width: 100%;
      min-width: auto;
    }
  }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="welcome-box">
    <span class="welcome-emoji">🌟</span>
    <h1 class="welcome-title">Welcome Back</h1>
    <p class="welcome-subtitle">Your Daily Routine Tracker</p>
    
    <div class="welcome-name" id="user-display">Loading...</div>
    
    <button class="welcome-btn" onclick="startApp()">Start Tracking →</button>
    
    <p class="loading-text" id="loading-status">Initializing Nandani's profile...</p>
    
    <div class="welcome-footer">
      🔒 All your data is saved locally and securely.
    </div>
  </div>
</div>

<script>
  // Initialize Nandani profile on first load
  function initializeNandani() {
    const NANDANI_ID = 'nandani_2026';
    const userName = 'Nandani Kumari';
    
    // Create user if doesn't exist
    let users = JSON.parse(localStorage.getItem('dayflow_users') || '{}');
    
    if (!users[NANDANI_ID]) {
      users[NANDANI_ID] = {
        id: NANDANI_ID,
        name: userName,
        email: 'nandani@dayflow.local',
        createdAt: new Date().toISOString(),
        lastLogin: new Date().toISOString()
      };
      localStorage.setItem('dayflow_users', JSON.stringify(users));
    } else {
      // Update last login
      users[NANDANI_ID].lastLogin = new Date().toISOString();
      localStorage.setItem('dayflow_users', JSON.stringify(users));
    }
    
    // Set as current user
    localStorage.setItem('dayflow_current_user', JSON.stringify({
      id: NANDANI_ID,
      name: userName
    }));
    
    // Display name
    document.getElementById('user-display').textContent = `👋 Hi, ${userName}!`;
    document.getElementById('loading-status').textContent = 'Ready to crush your goals today!';
  }

  function startApp() {
    window.location.href = 'routine-tracker.html';
  }

  // Initialize on load
  window.addEventListener('DOMContentLoaded', () => {
    initializeNandani();
    
    // Auto-redirect after 2 seconds
    setTimeout(() => {
      // Optionally auto-start, uncomment below
      // startApp();
    }, 2000);
  });

  // Enter key to start
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startApp();
  });
</script>

</body>
</html>
